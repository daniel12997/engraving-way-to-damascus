moretto-conversion:
  type: artwork
  title: "The Conversion of Saint Paul (La conversione di San Paolo)"
  author: ["Moretto da Brescia (Alessandro Bonvicino)"]
  date: 1540
  archive: Santuario di Santa Maria dei Miracoli presso San Celso
  archive-location: Milan
  url: https://en.wikipedia.org/wiki/Santa_Maria_presso_San_Celso
  note: >
    Painted c. 1540–1541 on a vault of the ambulatory of Santa Maria presso
    San Celso, Milan. Documented in archival payment records (715 lira to
    Alessandro Bonvicino, 1540–41); long misattributed to Callisto Piazza
    until reattribution on the basis of those documents. Notable for its
    minimal two-figure composition (Saul and his horse) which prefigures
    Caravaggio's later treatment of the same subject.

wallace-pauline-chapel:
  type: article
  title: "Narrative and Religious Expression in Michelangelo's Pauline Chapel"
  author: ["Wallace, William E."]
  date: 1989
  parent:
    type: periodical
    title: "Artibus et Historiae"
  volume: 10
  issue: 19
  page-range: 107-121
  note: >
    Standard modern scholarly reference for Michelangelo's two frescoes
    (The Conversion of Saul and The Crucifixion of St. Peter) in the
    Cappella Paolina of the Vatican Palace, painted 1542–1549. The
    Conversion of Saul fresco is dated c. 1542–45, oil fresco,
    approximately 625 × 661 cm.

