# Bibliography for "Push Engraving on Copper Plate: The Conversion on the Way to Damascus"
# Hayagriva format (Typst native bibliography format).
# See: https://github.com/typst/hayagriva/blob/main/docs/file-format.md

# =============================================================================
# Period treatises (primary sources)
# =============================================================================

theophilus:
  type: book
  title: On Divers Arts
  author: ["Theophilus Presbyter"]
  translator:
    - Hawthorne, John G.
    - Smith, Cyril Stanley
  date: 1979
  publisher: Dover Publications
  location: New York
  note: >
    Original manuscript c. 1100–1120 as "De Diversis Artibus." The oldest
    surviving complete treatise on metalworking crafts. Author traditionally
    identified (with caution) as Roger of Helmarshausen.

theophilus-hendrie:
  type: book
  title: "An Essay upon Various Arts, in Three Books, by Theophilus, called also Rugerus, Priest and Monk"
  author: ["Theophilus Presbyter"]
  translator: ["Hendrie, Robert"]
  date: 1847
  publisher: John Murray
  location: London
  url: https://archive.org/details/theophiliquietr01hendgoog
  note: >
    The first English translation of Theophilus's "De Diversis Artibus,"
    edited from a Wolfenbüttel manuscript with parallel Latin and English
    text. Public domain; used here for direct quotation of Book III chapters
    on iron tempering and the making of files and cutting irons.

cellini-treatises:
  type: book
  title: The Treatises of Benvenuto Cellini on Goldsmithing and Sculpture
  author: ["Cellini, Benvenuto"]
  translator: ["Ashbee, C. R."]
  date: 1967
  publisher: Dover Publications
  location: New York
  note: >
    Originally written in the 1560s as "Trattati dell'oreficeria e della
    scultura." Reprint of Ashbee's 1898 Essex House Press edition.

bosse-traite:
  type: book
  title: "Traicté des manieres de graver en taille dovce svr l'airin"
  author: ["Bosse, Abraham"]
  date: 1645
  location: Paris
  language: fr
  url: https://archive.org/details/traictdesmaniere00boss
  note: >
    The first published treatise specifically on engraving. English
    translation by William Faithorne, 1662. Documents practices and tools
    functionally unchanged from the previous century. Internet Archive
    facsimile contributed by Duke University Libraries.

